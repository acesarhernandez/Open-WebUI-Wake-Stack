services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.1.50:11434}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      USER_AGENT: ${USER_AGENT:-shopenwebui-local}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail http://127.0.0.1:8080/health | grep -q '\"status\":true'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 10m
    volumes:
      - open-webui-data:/app/backend/data
    expose:
      - "8080"

  wake-service:
    build:
      context: .
      dockerfile: Dockerfile.wake-service
    restart: unless-stopped
    environment:
      WAKE_BIND_HOST: ${WAKE_BIND_HOST:-0.0.0.0}
      WAKE_BIND_PORT: ${WAKE_BIND_PORT:-8787}
      ENGINE_NAME: ${ENGINE_NAME:-gaming-pc}
      ENGINE_CONTROL_URL: ${ENGINE_CONTROL_URL:-}
      ENGINE_CONTROL_API_KEY: ${ENGINE_CONTROL_API_KEY:-}
      ENGINE_MAC: ${ENGINE_MAC:-AA:BB:CC:DD:EE:FF}
      ENGINE_BROADCAST_IP: ${ENGINE_BROADCAST_IP:-192.168.1.255}
      ENGINE_HOST: ${ENGINE_HOST:-192.168.1.50}
      ENGINE_OLLAMA_PORT: ${ENGINE_OLLAMA_PORT:-11434}
      ENGINE_CONNECT_TIMEOUT_SECONDS: ${ENGINE_CONNECT_TIMEOUT_SECONDS:-2}
      ENGINE_WAKE_TIMEOUT_SECONDS: ${ENGINE_WAKE_TIMEOUT_SECONDS:-180}
      ENGINE_STATUS_POLL_INTERVAL_SECONDS: ${ENGINE_STATUS_POLL_INTERVAL_SECONDS:-5}
      ENABLE_WAKE_HEADER: ${ENABLE_WAKE_HEADER:-true}
      WAKE_API_ALLOWED_ORIGINS: ${WAKE_API_ALLOWED_ORIGINS:-http://localhost:3000}
      WAKE_API_TOKEN: ${WAKE_API_TOKEN:-}
      WAKE_SERVICE_VERSION: ${WAKE_SERVICE_VERSION:-1.0.0}
      OPENWEBUI_UPSTREAM_VERSION: ${OPENWEBUI_UPSTREAM_VERSION:-latest}
      CUSTOM_PATCH_VERSION: ${CUSTOM_PATCH_VERSION:-wake1}
      BUILD_SHA: ${BUILD_SHA:-dev}
      BUILD_DATE: ${BUILD_DATE:-unknown}
    expose:
      - "8787"

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - open-webui
      - wake-service
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./integration/nginx-openwebui.conf:/etc/nginx/conf.d/default.conf:ro
      - ./integration/wake-engine-overlay.js:/usr/share/nginx/html/wake-engine-overlay.js:ro

volumes:
  open-webui-data:
