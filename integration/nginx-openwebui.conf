map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /wake-engine-overlay.js {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location /api/wake-engine {
        proxy_pass http://wake-service:8787;
    }

    location /api/engine-status {
        proxy_pass http://wake-service:8787;
    }

    location /api/engine-health {
        proxy_pass http://wake-service:8787;
    }

    location /api/custom/diag {
        proxy_pass http://wake-service:8787;
    }

    location /healthz {
        proxy_pass http://wake-service:8787;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://open-webui:8080;
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</body>' '<script src="/wake-engine-overlay.js?v=wake17"></script></body>';
    }
}
